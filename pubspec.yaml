name: instagram_feed_clone
description: Flutter UI/UX Challenge - Instagram Pixel Perfect Feed

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Network Image Caching (Assignment recommended)
  cached_network_image: ^3.3.1

  # Shimmer Loading Effect
  shimmer: ^3.0.0

  # Image Carousel (Version 5.0.0 fixes the CarouselController conflict)
  carousel_slider: ^5.0.0

  # Dot Indicator
  smooth_page_indicator: ^1.1.0

  # Pinch To Zoom
  photo_view: ^0.14.0

  # Icons (Instagram style icons)
  flutter_svg: ^2.0.10+1

  # Time formatting
  timeago: ^3.6.1

  # Camera access
  camera: ^0.11.0+1
  path_provider: ^2.1.2
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
